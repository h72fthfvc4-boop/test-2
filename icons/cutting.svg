<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#fff8f0"/>
  
  <!-- Cutting/Blade Icon -->
  <g transform="translate(100, 100)">
    <!-- Harvester body -->
    <ellipse cx="0" cy="-5" rx="28" ry="35" fill="#DAA520" stroke="#8B7500" stroke-width="2"/>
    
    <!-- Cutting blade (curved) -->
    <path d="M -40 0 Q -35 -20 -20 -35 Q 0 -50 20 -35 Q 35 -20 40 0" 
          fill="none" stroke="#FF4500" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Blade teeth -->
    <line x1="-30" y1="-15" x2="-28" y2="-25" stroke="#FF4500" stroke-width="2"/>
    <line x1="-10" y1="-30" x2="-8" y2="-42" stroke="#FF4500" stroke-width="2"/>
    <line x1="10" y1="-30" x2="12" y2="-42" stroke="#FF4500" stroke-width="2"/>
    <line x1="30" y1="-15" x2="32" y2="-25" stroke="#FF4500" stroke-width="2"/>
    
    <!-- Collection chute -->
    <path d="M -25 20 L -15 50 L 15 50 L 25 20 Z" fill="#CD853F" stroke="#8B4513" stroke-width="2"/>
    
    <!-- Grain particles (falling) -->
    <circle cx="-8" cy="35" r="3" fill="#FFD700"/>
    <circle cx="0" cy="42" r="3" fill="#FFD700"/>
    <circle cx="8" cy="38" r="3" fill="#FFD700"/>
    
    <!-- Direction arrow -->
    <path d="M 0 -60 L 0 -50 M -6 -55 L 0 -50 L 6 -55" stroke="#FF4500" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
</svg>
