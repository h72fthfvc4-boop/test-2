<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#f0f8ff"/>
  
  <!-- Truck/Loading Icon -->
  <g transform="translate(100, 100)">
    <!-- Truck body -->
    <rect x="-60" y="-30" width="80" height="40" fill="#FF6B35" rx="5"/>
    
    <!-- Truck cabin -->
    <rect x="-30" y="-35" width="25" height="25" fill="#FF6B35" rx="3"/>
    
    <!-- Cabin window -->
    <rect x="-27" y="-32" width="19" height="15" fill="#87CEEB"/>
    
    <!-- Wheels -->
    <circle cx="-40" cy="20" r="12" fill="#333"/>
    <circle cx="35" cy="20" r="12" fill="#333"/>
    
    <!-- Wheel details -->
    <circle cx="-40" cy="20" r="8" fill="#555"/>
    <circle cx="35" cy="20" r="8" fill="#555"/>
    
    <!-- Loading boxes -->
    <rect x="10" y="-28" width="18" height="18" fill="#FFA500" rx="2"/>
    <rect x="32" y="-28" width="18" height="18" fill="#FFB84D" rx="2"/>
    <rect x="21" y="-8" width="18" height="18" fill="#FF8C42" rx="2"/>
    
    <!-- Arrow pointing up (loading indication) -->
    <path d="M 0 -55 L 0 -45 M -8 -50 L 0 -45 L 8 -50" stroke="#FF6B35" stroke-width="2" fill="none"/>
  </g>
</svg>
