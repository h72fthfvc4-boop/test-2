<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#f5f5f5"/>
  
  <!-- Screwdriver/Tool - Calibration des capteurs -->
  <g transform="translate(100, 100)">
    <!-- Handle -->
    <rect x="-8" y="15" width="16" height="40" fill="none" stroke="#000" stroke-width="2" rx="3"/>
    
    <!-- Handle grip lines -->
    <line x1="-6" y1="25" x2="6" y2="25" stroke="#000" stroke-width="1"/>
    <line x1="-6" y1="33" x2="6" y2="33" stroke="#000" stroke-width="1"/>
    <line x1="-6" y1="41" x2="6" y2="41" stroke="#000" stroke-width="1"/>
    <line x1="-6" y1="49" x2="6" y2="49" stroke="#000" stroke-width="1"/>
    
    <!-- Shaft -->
    <line x1="-2" y1="15" x2="2" y2="15" stroke="#000" stroke-width="2"/>
    <line x1="-2" y1="15" x2="-2" y2="-10" stroke="#000" stroke-width="2"/>
    <line x1="2" y1="15" x2="2" y2="-10" stroke="#000" stroke-width="2"/>
    
    <!-- Tip (cross-shaped) -->
    <g transform="translate(0, -15)">
      <!-- Vertical line -->
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Horizontal line -->
      <line x1="-6" y1="0" x2="6" y2="0" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>
</svg>
