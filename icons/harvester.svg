<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#f5f5f5"/>
  
  <!-- Combine Harvester - Réglages de la coupe -->
  <g transform="translate(100, 100)">
    <!-- Main body -->
    <rect x="-35" y="-20" width="70" height="35" fill="none" stroke="#000" stroke-width="2" rx="5"/>
    
    <!-- Cab -->
    <rect x="-18" y="-30" width="20" height="15" fill="none" stroke="#000" stroke-width="2" rx="2"/>
    <line x1="-14" y1="-25" x2="-4" y2="-25" stroke="#000" stroke-width="1.5"/>
    
    <!-- Cutting header (front) -->
    <path d="M -35 15 L -40 25 L 40 25 L 35 15" fill="none" stroke="#000" stroke-width="2"/>
    
    <!-- Cutting teeth -->
    <line x1="-35" y1="15" x2="-35" y2="22" stroke="#000" stroke-width="1.5"/>
    <line x1="-25" y1="15" x2="-25" y2="22" stroke="#000" stroke-width="1.5"/>
    <line x1="-15" y1="15" x2="-15" y2="22" stroke="#000" stroke-width="1.5"/>
    <line x1="-5" y1="15" x2="-5" y2="22" stroke="#000" stroke-width="1.5"/>
    <line x1="5" y1="15" x2="5" y2="22" stroke="#000" stroke-width="1.5"/>
    <line x1="15" y1="15" x2="15" y2="22" stroke="#000" stroke-width="1.5"/>
    <line x1="25" y1="15" x2="25" y2="22" stroke="#000" stroke-width="1.5"/>
    <line x1="35" y1="15" x2="35" y2="22" stroke="#000" stroke-width="1.5"/>
    
    <!-- Wheels -->
    <circle cx="-25" cy="35" r="8" fill="none" stroke="#000" stroke-width="2"/>
    <circle cx="25" cy="35" r="8" fill="none" stroke="#000" stroke-width="2"/>
    
    <!-- Wheel details -->
    <circle cx="-25" cy="35" r="4" fill="#000"/>
    <circle cx="25" cy="35" r="4" fill="#000"/>
  </g>
</svg>
